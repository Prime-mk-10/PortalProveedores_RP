<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Contraseña · Portal Maestro</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="CSS/forgot_password.css">
</head>
<body>
  <div class="recovery-card p-8">
    <!-- Paso 1: Solicitar correo y captcha -->
    <div id="step1" class="step">
      <div class="text-center mb-6">
        <i class="fas fa-key text-5xl text-[#0b3b5b] mb-3"></i>
        <h2 class="text-2xl font-bold text-[#0b3b5b]">Recuperar contraseña</h2>
        <p class="text-gray-600 mt-2">Verificaremos tu correo y podrás establecer una nueva contraseña</p>
      </div>

      <form id="formStep1">
        <div class="mb-4">
          <label class="block text-gray-700 font-medium mb-2">
            <i class="fas fa-envelope mr-2"></i>Correo electrónico
          </label>
          <input type="email" id="email" name="email" required 
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#0b3b5b] focus:border-transparent"
                 placeholder="ejemplo@correo.com">
        </div>

        <!-- Captcha matemático mejorado -->
        <div class="mb-4">
          <label class="block text-gray-700 font-medium mb-2">
            <i class="fas fa-shield-alt mr-2"></i>Verificación de seguridad
          </label>
          <div class="captcha-container relative">
            <div id="captchaQuestion" class="captcha-box mb-2"></div>
            <button type="button" id="refreshCaptcha" class="refresh-captcha" title="Generar nuevo captcha">
              <i class="fas fa-sync-alt"></i>
            </button>
          </div>
          <input type="text" id="captchaAnswer" name="captcha_answer" required
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#0b3b5b]"
                 placeholder="Ingresa el resultado numérico">
          <input type="hidden" id="captchaExpected" name="captcha_expected">
          <div id="captchaHint" class="captcha-hint">
            <i class="fas fa-info-circle"></i> Resuelve la operación matemática e ingresa el número resultante
          </div>
        </div>

        <button type="submit" id="btnCheckEmail" 
                class="btn-primary w-full text-white py-2 rounded-lg font-semibold flex items-center justify-center gap-2">
          <i class="fas fa-paper-plane"></i> Verificar correo
        </button>
      </form>

      <div class="mt-6 text-center">
        <a href="login.html" class="text-[#0b3b5b] hover:underline text-sm">
          <i class="fas fa-arrow-left mr-1"></i> Volver al inicio de sesión
        </a>
      </div>
      <div id="step1Message" class="mt-4 text-center text-sm"></div>
    </div>

    <!-- Paso 2: Establecer nueva contraseña (inicialmente oculto) -->
    <div id="step2" class="step hidden-step">
      <div class="text-center mb-6">
        <i class="fas fa-lock-open text-5xl text-[#0b3b5b] mb-3"></i>
        <h2 class="text-2xl font-bold text-[#0b3b5b]">Nueva contraseña</h2>
        <p id="step2EmailDisplay" class="text-gray-600 mt-2 text-sm"></p>
        <p class="text-xs text-gray-500 mt-1">Mínimo 8 caracteres, una mayúscula y un número</p>
      </div>

      <form id="formStep2">
        <div class="mb-4">
          <label class="block text-gray-700 font-medium mb-2">
            <i class="fas fa-key mr-2"></i>Nueva contraseña
          </label>
          <input type="password" id="newPassword" name="new_password" required
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#0b3b5b]"
                 placeholder="Mínimo 8 caracteres">
          <div id="passwordStrength" class="password-strength"></div>
        </div>
        <div class="mb-4">
          <label class="block text-gray-700 font-medium mb-2">
            <i class="fas fa-check-circle mr-2"></i>Confirmar contraseña
          </label>
          <input type="password" id="confirmPassword" name="confirm_password" required
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#0b3b5b]"
                 placeholder="Repite la contraseña">
        </div>
        <button type="submit" id="btnUpdatePassword"
                class="btn-primary w-full text-white py-2 rounded-lg font-semibold flex items-center justify-center gap-2">
          <i class="fas fa-save"></i> Actualizar contraseña
        </button>
      </form>

      <div class="mt-6 text-center">
        <button id="backToStep1" class="text-gray-500 hover:text-[#0b3b5b] text-sm">
          <i class="fas fa-chevron-left mr-1"></i> Volver al paso anterior
        </button>
      </div>
      <div id="step2Message" class="mt-4 text-center text-sm"></div>
    </div>
  </div>

  <script src="Scripts/forgot_password.js"></script>
</body>
</html>
