<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Maestro de Contrataciones · Módulo Sourcing</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="./CSS/style.css">
  <script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/flowbite@2.5.2/dist/flowbite.min.js" crossorigin="anonymous"></script>
</head>
<body>

  <!-- Contenedor donde se cargará el navbar + sidebar -->
  <div id="nav-placeholder"></div>

  <!-- Contenedor del contenido principal (con margen dinámico) -->
  <div class="p-4 sm:ml-64 mt-14" id="main-content-container">
    <!-- Aquí se inyectará el contenido de cada módulo -->
  </div>

  <footer class="sm:ml-64 mt-8 p-4 text-center text-sm text-gray-500 border-t border-default">
    <p>Portal Maestro de Contrataciones · Ciudad de México · Contrataciones abiertas y eficientes</p>
    <p style="margin-top: 0.5rem; font-size: 0.8rem;">Módulo Sourcing · Diseño apegado a imagen oficial</p>
  </footer>

  <script src="./Scripts/script.js"></script>

<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          brand: '#0b3b5b',
          'brand-strong': '#0f4a73',
          'brand-medium': '#2a6d9c',
          heading: '#0b3b5b',
          body: '#1e293b',
          neutral: {
            primary: '#ffffff',
            'primary-soft': '#f8fafc',    // bg-neutral-primary-soft
            secondary: { soft: '#f8fafc' },
            'secondary-medium': '#f1f5f9', // hover backgrounds
            tertiary: '#e2e8f0',
            'tertiary-medium': '#cbd5e1',
          },
          fg: {
            disabled: '#94a3b8',
            brand: '#0b3b5b',
            'danger-strong': '#b91c1c',
          },
          danger: {
            soft: '#fee2e2',
            subtle: '#fecaca',
          },
          default: '#e5e7eb', // para border-default
        },
        borderRadius: {
          base: '0.5rem',
          sm: '0.25rem'
        }
      }
    }
  }
    </script>
</body>
</html>
